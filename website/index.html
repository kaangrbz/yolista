<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yolista - Seyahat Deneyimlerinizi Paylaşın</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Yolista ile seyahat rotalarınızı keşfedin ve paylaşın. Benzersiz deneyimler, güzel anılar ve yeni yerler sizi bekliyor.">
    <meta name="keywords" content="seyahat, rota, gezi, tatil, keşif, paylaşım">
    <meta name="author" content="Yolista">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Yolista - Seyahat Deneyimlerinizi Paylaşın">
    <meta property="og:description" content="Seyahat rotalarınızı keşfedin ve paylaşın">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://web.youlistaapp.com">
    <meta property="og:image" content="https://web.youlistaapp.com/assets/og-image.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Yolista - Seyahat Deneyimlerinizi Paylaşın">
    <meta name="twitter:description" content="Seyahat rotalarınızı keşfedin ve paylaşın">
    <meta name="twitter:image" content="https://web.youlistaapp.com/assets/og-image.png">
    
    <!-- App Store Badge -->
    <meta name="apple-itunes-app" content="app-id=YOUR_APP_ID">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .content {
            margin-bottom: 2rem;
        }
        
        .content h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #FFD700;
        }
        
        .content p {
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 1rem;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #1DA1F2, #0d8bd9);
            color: white;
            box-shadow: 0 4px 15px rgba(29, 161, 242, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 161, 242, 0.6);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .loading.show {
            display: flex;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        @media (max-width: 600px) {
            .container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .logo {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Yolista</div>
        <div class="subtitle">Seyahat deneyimlerinizi paylaşın, yeni rotalar keşfedin</div>
        
        <div class="content" id="content">
            <h2>Hoş Geldiniz!</h2>
            <p>Bu içeriği görüntülemek için Yolista uygulamasını açın.</p>
        </div>
        
        <div class="buttons">
            <button class="btn btn-primary" onclick="openApp()">
                📱 Uygulamayı Aç
            </button>
            <a href="#" class="btn btn-secondary" id="downloadBtn" style="display: none;">
                📥 Uygulamayı İndir
            </a>
            <button class="btn btn-secondary" onclick="copyLink()">
                🔗 Linki Kopyala
            </button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Uygulama açılıyor...</span>
        </div>
        
        <div class="footer">
            <p>© 2024 Yolista. Tüm hakları saklıdır.</p>
        </div>
    </div>

    <script>
        // URL parametrelerini parse et
        const urlParams = new URLSearchParams(window.location.search);
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        
        // Deep link data'yı oluştur
        const deepLinkData = {
            type: pathParts[0] || 'home',
            id: pathParts[1] || '',
            params: Object.fromEntries(urlParams.entries())
        };
        
        // İçeriği güncelle
        updateContent();
        
        function updateContent() {
            const content = document.getElementById('content');
            
            switch (deepLinkData.type) {
                case 'route':
                    content.innerHTML = `
                        <h2>🗺️ Rota Detayı</h2>
                        <p>Bu rotayı görüntülemek için Yolista uygulamasını açın.</p>
                        <p><strong>Rota ID:</strong> ${deepLinkData.id}</p>
                    `;
                    break;
                case 'profile':
                    content.innerHTML = `
                        <h2>👤 Kullanıcı Profili</h2>
                        <p>Bu profili görüntülemek için Yolista uygulamasını açın.</p>
                        <p><strong>Kullanıcı ID:</strong> ${deepLinkData.id}</p>
                    `;
                    break;
                case 'category':
                    content.innerHTML = `
                        <h2>📂 Kategori</h2>
                        <p>Bu kategoriyi görüntülemek için Yolista uygulamasını açın.</p>
                        <p><strong>Kategori ID:</strong> ${deepLinkData.id}</p>
                    `;
                    break;
                default:
                    content.innerHTML = `
                        <h2>🌟 Hoş Geldiniz!</h2>
                        <p>Yolista uygulamasında seyahat deneyimlerinizi paylaşın ve yeni rotalar keşfedin.</p>
                    `;
            }
        }
        
        function openApp() {
            const loading = document.getElementById('loading');
            loading.classList.add('show');
            
            // App scheme URL oluştur
            let appUrl = 'yolista://';
            if (deepLinkData.type && deepLinkData.type !== 'home') {
                appUrl += `${deepLinkData.type}`;
                if (deepLinkData.id) {
                    appUrl += `/${deepLinkData.id}`;
                }
            }
            
            // Query parameters ekle
            if (Object.keys(deepLinkData.params).length > 0) {
                const params = new URLSearchParams(deepLinkData.params);
                appUrl += `?${params.toString()}`;
            }
            
            console.log('Trying to open app with URL:', appUrl);
            
            // Uygulamayı açmaya çalış
            window.location.href = appUrl;
            
            // 3 saniye sonra loading'i kapat ve download butonu göster
            setTimeout(() => {
                loading.classList.remove('show');
                const downloadBtn = document.getElementById('downloadBtn');
                downloadBtn.style.display = 'inline-block';
                
                // Platform'a göre download link'i ayarla
                if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                    downloadBtn.href = 'https://apps.apple.com/app/yolista/id' + 'YOUR_APP_ID';
                    downloadBtn.innerHTML = '📱 App Store\'dan İndir';
                } else {
                    downloadBtn.href = 'https://play.google.com/store/apps/details?id=com.yolista';
                    downloadBtn.innerHTML = '📱 Google Play\'den İndir';
                }
            }, 3000);
        }
        
        function copyLink() {
            const currentUrl = window.location.href;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(currentUrl).then(() => {
                    showToast('Link kopyalandı! 📋');
                }).catch(() => {
                    fallbackCopyTextToClipboard(currentUrl);
                });
            } else {
                fallbackCopyTextToClipboard(currentUrl);
            }
        }
        
        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast('Link kopyalandı! 📋');
                } else {
                    showToast('Link kopyalanamadı ❌');
                }
            } catch (err) {
                showToast('Link kopyalanamadı ❌');
            }
            
            document.body.removeChild(textArea);
        }
        
        function showToast(message) {
            // Simple toast notification
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                z-index: 1000;
                font-size: 14px;
                animation: slideIn 0.3s ease;
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 2000);
        }
        
        // CSS animations for toast
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // Auto-redirect after page load (optional)
        window.addEventListener('load', () => {
            // Eğer mobile cihazsa ve app parametresi varsa otomatik aç
            if (/Mobi|Android/i.test(navigator.userAgent) && urlParams.get('auto') === 'true') {
                setTimeout(openApp, 1000);
            }
        });
        
        // Handle back button for better UX
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                // Page was loaded from cache, user likely came back from app
                const loading = document.getElementById('loading');
                loading.classList.remove('show');
            }
        });
    </script>
</body>
</html>
